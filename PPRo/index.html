const fuera=c=>{
  if(c.op==="max")return typeof c.valor==="number"&&c.valor>c.limite;
  if(c.op==="min")return typeof c.valor==="number"&&c.valor<c.limite;
  return false;
};
const cerca=c=>{
  if(fuera(c))return false;
  if(c.op==="max")return typeof c.valor==="number"&&c.valor>c.limite*0.78;
  if(c.op==="min")return typeof c.valor==="number"&&c.valor<c.limite*1.18;
  return false;
};

  if(s.controles.some(fuera))return"alert";

  return"ok";
};

const formatChartValue=(value,{percent=false,suffix="",decimals=2}={})=>{
  if(typeof value!=="number"||!Number.isFinite(value)) return "";
  const rounded=Math.abs(value)>=100?value.toFixed(0):value.toFixed(decimals);
  const normalized=String(rounded).replace(/\.00$/," ").replace(/(\.\d*[1-9])0+$/,"$1").trim();
  return `${normalized}${percent?"%":""}${suffix}`;
};

};
const parseUiDate=(value)=>{
  const text=String(value||"").trim();
  if(!text) return 0;
  const direct=Date.parse(text);
  if(!Number.isNaN(direct)) return direct;

  const ymd=text.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(ymd){
    const [,year,month,day]=ymd;
    const iso=`${year}-${month.padStart(2,"0")}-${day.padStart(2,"0")}`;
    const stamp=Date.parse(iso);
    if(!Number.isNaN(stamp)) return stamp;
  }

  const dmyOrMdy=text.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(!dmyOrMdy) return 0;
  let [,a,b,year]=dmyOrMdy;
  if(year.length===2) year=`20${year}`;

  const candidates=[];
  const dmy=`${year.padStart(4,"0")}-${b.padStart(2,"0")}-${a.padStart(2,"0")}`;
  const mdy=`${year.padStart(4,"0")}-${a.padStart(2,"0")}-${b.padStart(2,"0")}`;
  const dmyStamp=Date.parse(dmy);
  const mdyStamp=Date.parse(mdy);
  if(!Number.isNaN(dmyStamp)) candidates.push(dmyStamp);
  if(!Number.isNaN(mdyStamp)) candidates.push(mdyStamp);
  if(!candidates.length) return 0;
  return Math.max(...candidates);
};
const mkTrendLabels=(selectedTab,controlName,length)=>{
  const prefix=selectedTab==="TODAS"?"M":normTabName(selectedTab).split(" ").slice(0,2).join("-")||"L";
  const shortName=String(controlName||"").split(" ")[0]||"C";
  return Array.from({length},(_,i)=>`${prefix}-${shortName}-${i+1}`);
};
const normTabName=(value)=>String(value||"")
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g,"")
  .toUpperCase()
  .replace(/[._-]+/g," ")
  .replace(/\s+/g," ")
  .trim();
const canonicalTabName=(value)=>normTabName(value).replace(/\s+/g,"");
const sameTabName=(a,b)=>{
  const ca=canonicalTabName(a),cb=canonicalTabName(b);
  if(!ca||!cb) return false;
  return ca===cb;
};

  const agg=AGGREGATES_BY_TAB[selectedTab]||{};
  const allTabsRecords=selectedTab==="TODAS"?Object.values(AGGREGATES_BY_TAB):[];
  clone.forEach((sheet)=>{
    let byRecord=agg[sheet.codigo]||null;
    if(selectedTab==="TODAS"){
      const records=allTabsRecords
        .map((tabPayload)=>tabPayload&&tabPayload[sheet.codigo]?tabPayload[sheet.codigo]:null)
        .filter(Boolean);
      if(records.length){
        const mergedControls={};
        (sheet.controles||[]).forEach((ctrl)=>{
          const samples=records
            .map((r)=>r&&r.controles?r.controles[ctrl.name]:null)
            .filter(Boolean);
          if(!samples.length) return;
          const numericVals=samples
            .map((s)=>typeof s.valor==="number"&&Number.isFinite(s.valor)?s.valor:null)
            .filter((v)=>v!=null);
          const stringVals=samples
            .map((s)=>typeof s.valor==="string"?s.valor.trim():"")
            .filter(Boolean);
          const hist=samples
            .flatMap((s)=>Array.isArray(s.hist)?s.hist:[])
            .filter((v)=>typeof v==="number"&&Number.isFinite(v));
          const labels=samples
            .flatMap((s)=>Array.isArray(s.labels)?s.labels:[])
            .map((v)=>String(v||"").trim())
            .filter(Boolean);
          const payload={};
          if(numericVals.length){
            payload.valor=Math.round((numericVals.reduce((a,b)=>a+b,0)/numericVals.length)*100)/100;
          } else if(stringVals.length){
            payload.valor=stringVals[stringVals.length-1];
          } else {
            payload.valor=null;
          }
          if(hist.length) payload.hist=hist;
          if(labels.length===hist.length&&hist.length) payload.labels=labels;
          mergedControls[ctrl.name]=payload;
        });
        byRecord={
          muestras:records.reduce((acc,r)=>acc+(typeof r.muestras==="number"?r.muestras:1),0),
          controles:mergedControls
        };
      }
    }
    sheet.dataSource=byRecord?"lote_real":"sin_dato_real";
    sheet.promedioMuestras=byRecord&&byRecord.muestras?byRecord.muestras:null;
    sheet.controles=sheet.controles.map((c)=>{
      const updated={...c};
      const originalHist=updated.hist&&Array.isArray(updated.hist.data)&&updated.hist.data.length
        ? {...updated.hist}
        : null;
      const ov=byRecord&&byRecord.controles?byRecord.controles[c.name]:null;
      updated.histSource="none";
      if(ov){
        if(typeof ov.valor==="number") updated.valor=ov.valor;
        if(typeof ov.valor==="string") updated.valor=ov.valor;
        if(Array.isArray(ov.hist)&&ov.hist.length){
          const labels=Array.isArray(ov.labels)&&ov.labels.length===ov.hist.length
            ? ov.labels
            : originalHist&&Array.isArray(originalHist.labels)&&originalHist.labels.length===ov.hist.length
            ? originalHist.labels
            : mkTrendLabels(selectedTab,c.name,ov.hist.length);
          updated.hist={labels,data:ov.hist};
          updated.histSource=sheet.promedioMuestras&&sheet.promedioMuestras>1?"aggregate":"detail";
        }
      } else {
        updated.valor=null;
        updated.hist={labels:[],data:[]};
      }
      return updated;
    });
  });
  return clone;
},[selectedTab]);

  const tabsWithRecord=aggregateTabOrder.filter(tabName=>!!((AGGREGATES_BY_TAB[tabName]||{})[sheet.codigo]));
  const lastTab=tabsWithRecord.length?tabsWithRecord[tabsWithRecord.length-1]:"";
  let bestDate=sheet.ultimaFecha||"";
  let bestTimestamp=parseUiDate(bestDate);
  let bestTab=lastTab||sheet.nombreHoja||"";

  const scanRecord=(tabName,record)=>{
    if(!record||!record.controles) return;
    Object.entries(record.controles).forEach(([controlName,control])=>{
      const keyTs=parseUiDate(controlName);
      if(keyTs>bestTimestamp){
        bestTimestamp=keyTs;
        bestDate=String(controlName).trim();
        bestTab=tabName;
      }
      if(control&&Array.isArray(control.labels)){
        control.labels.forEach((label)=>{
          const ts=parseUiDate(label);
          if(ts>bestTimestamp){
            bestTimestamp=ts;
            bestDate=String(label).trim();
            bestTab=tabName;
          }
        });
      }
      if(control&&typeof control.valor==="string"){
        const ts=parseUiDate(control.valor);
        if(ts>bestTimestamp){
          bestTimestamp=ts;
          bestDate=String(control.valor).trim();
          bestTab=tabName;

          bestTimestamp=ts;
          bestDate=String(control.ultimaFechaRegistro).trim();

  const rLabels=validS.map(s=>s.codigo);
  const rPtCols=[];
  const rData=validS.map(s=>{
    const mc=s.controles[0];
    if(!mc||typeof mc.limite!=="number"||mc.limite===0){rPtCols.push("#64748b");return null;}
    let val=mc.valor;
    if(selectedTab!=="TODAS"){
      const aggCtrl=((AGGREGATES_BY_TAB[selectedTab]||{})[s.codigo]?.controles||{})[mc.name];
      if(aggCtrl&&typeof aggCtrl.valor==="number")val=aggCtrl.valor;
    }
    if(typeof val!=="number"){rPtCols.push("#64748b");return null;}
    const pctOfLim=(val/mc.limite)*100;
    rPtCols.push(pctOfLim>100?"#ef4444":pctOfLim>78?"#f59e0b":"#22c55e");
    return Math.min(pctOfLim,200);
  });
  const rLimData=validS.map(()=>100);
  window._c["radar_compl"]=new Chart(rvs,{
    type:"radar",

      datasets:[

    <div className="card-base card-dark p-4"><p className="text-slate-500 text-xs uppercase tracking-widest mb-1">Exportado</p><p className="text-lg md:text-2xl font-bold text-green-400" title={qualityLotInfo.exportado}>{qualityLotInfo.exportado}</p></div>
  </div>

  {/* ===== KPIs ===== */}
  <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
    {[
      {l:"CUMPLIMIENTO",v:cPct+"%",s:conf+"/"+conD.length+" controles OK",c:"text-green-400"},
      {l:"ALERTAS",v:alertas.length,s:"No conformidades activas",c:alertas.length?"text-red-400 blink":"text-slate-500"},
      {l:"ADVERTENCIAS",v:warns.length,s:"Cerca del limite critico",c:warns.length?"text-yellow-400":"text-slate-500"},
      {l:"DATOS REALES",v:datosRealesActivos+"/"+activeSheets.length,s:"Registros activos con consolidado publico",c:"text-cyan-400"}
    ].map((k,i)=>(
    <div key={i} className="card-base card-dark p-4">
      <p className="text-slate-500 text-xs uppercase tracking-widest mb-1">{k.l}</p>
      <p className={"text-3xl font-bold "+k.c}>{k.v}</p>
      <p className="text-slate-600 text-xs mt-1">{k.s}</p>
    </div>))}
  </div>

  {/* ===== ALERTAS CRITICAS ===== */}
  {alertas.length>0&&(
  <div className="mb-6 p-4 rounded-xl border border-red-700/50 bg-red-950/30">
    <h2 className="text-base font-bold text-red-400 mb-3 flex items-center gap-2">
      <span className="blink text-lg">&#9888;</span>
      <span className="blink">ALERTAS CRITICAS ACTIVAS ({alertas.length})</span>
    </h2>
    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
      {alertas.map(s=>(
      <div key={s.id} className="card-base card-alert pulse-red p-4">
        <div className="flex items-start justify-between mb-2 gap-2">
          <div>
            <span className="mono text-xs text-red-300 bg-red-900/40 px-2 py-0.5 rounded font-bold">{s.codigo}</span>
            <p className="text-white text-xs font-semibold leading-tight mt-1">{s.nombre}</p>
            <p className="text-slate-500 text-xs mono mt-0.5">Hoja: {s.hojaActiva} | {s.ultimaFecha}</p>
          </div>
        </div>
        {s.controles.filter(fuera).map((c,i)=>(
        <div key={i} className="mt-2 text-xs bg-red-900/30 border border-red-700/30 rounded p-2">
          <span className="text-red-200 font-bold">{c.name}:</span>
          <span className="text-red-100 mono ml-1">{c.valor}{c.unidad}</span>
          <span className="text-slate-500 ml-1">vs limite {c.op==="min"?">=":(c.op==="max"?"<":"")}{c.limite}{typeof c.limite==="number"?c.unidad:""}</span>
          <span className="text-red-400 font-bold ml-2">FUERA</span>
        </div>))}
        <a href={s.hojaDirecta} target="_blank" rel="noopener noreferrer" className="btn-hoja btn-alerta mt-3 inline-block">
          &#8599; Ver lote {selectedTab==="TODAS"?s.nombreHoja:selectedTab}
        </a>
      </div>))}
    </div>
  </div>)}

  {/* ===== LEYENDA ===== */}
  <div className="flex flex-wrap gap-4 mb-6 text-xs text-slate-500">
    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-red-500 inline-block"></span>Punto ROJO = supera limite</span>
    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-yellow-400 inline-block"></span>Punto AMARILLO = cerca del limite</span>
    <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-green-500 inline-block"></span>Punto VERDE = conforme</span>
    <span className="flex items-center gap-1"><span className="inline-block w-6 border-t-2 border-dashed border-red-500"></span> Linea de puntos = Limite critico</span>
  </div>

  {/* ===== ANALISIS COMPARATIVO ===== */}
  <h2 className="text-base font-bold text-purple-400 mb-3 uppercase tracking-wide">Analisis Comparativo por Lote</h2>
  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <div className="card-base card-dark p-4">
      <h3 className="text-sm font-bold text-purple-300 mb-1">Radar — Perfil de Conformidad</h3>
      <p className="text-xs text-slate-500 mb-2">Lote: <span className="mono text-purple-300">{selectedTab==="TODAS"?"Base Registro":selectedTab}</span>. Interior al circulo rojo = conforme. Punto rojo = fuera de limite.</p>
      <canvas id="radar-compliance" height="270"></canvas>
    </div>
    <div className="card-base card-dark p-4">
      <h3 className="text-sm font-bold text-indigo-300 mb-1">Barras — Comparacion Multi-Lote</h3>
      <p className="text-xs text-slate-500 mb-2">Registro: <span className="mono text-indigo-300">{selectedRegistro==="TODOS"?"(usar sidebar para seleccionar registro)": selectedRegistro}</span>. Control principal por lote disponible.</p>
      {selectedRegistro==="TODOS"?(<div className="text-xs text-slate-600 bg-black/20 rounded p-4 h-48 flex items-center justify-center">Selecciona un registro en el panel lateral para comparar todos los lotes.</div>):(<canvas id="bar-multilot" height="270"></canvas>)}
    </div>
  </div>

  {/* ===== TENDENCIAS DINAMICAS (TODOS LOS REGISTROS) ===== */}
  <h2 className="text-base font-bold text-cyan-400 mb-4 uppercase tracking-wide">Tendencias con Limites Criticos - Todos los Registros</h2>
  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-4">
    {trendSheets.map((s)=>{
      const st=stSheet(s);
      const cardClass=!s.matchTab?"card-nd opacity-70":st==="alert"?"card-alert":st==="warn"?"card-warn":"card-ok";
      return (
      <div key={"trend-card-"+s.id} className={"card-base p-4 "+cardClass}>
        <div className="flex items-start justify-between gap-2 mb-2">
          <div>
            <p className="mono text-xs text-cyan-500 font-bold">{s.codigo}</p>
            <h3 className="text-sm font-bold text-slate-200 leading-tight">{s.nombre}</h3>
            <p className="text-slate-500 text-xs mt-0.5">{s.ultimaFecha} | Lote: {s.hojaActiva}</p>
          </div>
          <a href={s.hojaDirecta||s.link} target="_blank" rel="noopener noreferrer" className={"btn-hoja "+(st==="alert"?"btn-alerta":"")}>
            &#8599; {selectedTab==="TODAS"?"Registro":"Lote "+selectedTab}
          </a>
        </div>
        {!s.matchTab&&selectedTab!=="TODAS"&&<p className="text-xs text-slate-500 mb-2">No aplica para {selectedTab}</p>}
        {s.matchTab&&selectedTab!=="TODAS"&&s.dataSource==="base_registro"&&<div className="text-xs text-yellow-300 bg-yellow-900/20 border border-yellow-700/30 rounded p-3 mb-2">Sin consolidado publico para {selectedTab} en este registro. Se muestra base validada del registro.</div>}
        {s.matchTab&&selectedTab!=="TODAS"&&s.promedioMuestras&&s.hasAggregateTrend&&<div className="text-xs text-cyan-300 bg-cyan-950/20 border border-cyan-800/30 rounded p-3 mb-2">Promedio operativo calculado con {s.promedioMuestras} hoja(s) para este nombre.</div>}
        {s.matchTab&&selectedTab!=="TODAS"&&!s.hasAggregateTrend&&s.hasHist&&<div className="text-xs text-green-300 bg-green-950/20 border border-green-800/30 rounded p-3 mb-2">Detalle real de la hoja seleccionada para {selectedTab}.</div>}
        {(s.hasHist||s.hasMultiLotData)&&s.matchTab?<canvas id={`trend-${s.id}`} height="185"></canvas>:<div className="text-xs text-slate-500 bg-black/20 rounded p-3">Sin tendencia historica numerica en este registro.</div>}
      </div>
      );
    })}
  </div>

  {/* DOUGHNUT */}
  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
    <div className="card-base card-dark p-5 flex flex-col items-center justify-center">
      <h3 className="text-sm font-bold text-cyan-300 mb-3">Estado General 14 Registros</h3>
      <div style={{maxWidth:"220px",width:"100%"}}>
        <canvas id="ch8"></canvas>
      </div>
    </div>
    <div className="md:col-span-2 card-base card-dark p-5">
      <h3 className="text-sm font-bold text-cyan-300 mb-3">POES - Higiene y Saneamiento ({selectedTab})</h3>
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-xs">
        <div className="bg-green-900/20 border border-green-600/30 rounded-lg p-3">
          <p className="text-green-400 font-bold mb-1">Registros conformes</p>
          <p className="text-slate-300">{conf} de {conD.length} registros conformes en el nombre seleccionado.</p>
          <p className="text-slate-500 mt-1">Actualización instantánea por pestaña/lote.</p>
        </div>
        <div className="bg-green-900/20 border border-green-600/30 rounded-lg p-3">
          <p className="text-green-400 font-bold mb-1">Advertencias activas</p>
          <p className="text-slate-300">{warns.length} registro(s) cerca del límite crítico.</p>
          <p className="text-slate-500 mt-1">Revisar tendencias de color amarillo en los cuadros.</p>
        </div>
        <div className={(alertas.length?"bg-red-900/20 border-red-600/30":"bg-slate-900/20 border-slate-700/30")+" border rounded-lg p-3"}>
          <p className={(alertas.length?"text-red-400":"text-slate-400")+" font-bold mb-1"}>{alertas.length?"Alertas críticas activas":"Sin alertas críticas"}</p>
          <p className="text-slate-300">{alertas.length?`${alertas.length} registro(s) fuera de límite para ${selectedTab}.`:`No hay no conformidades para el nombre seleccionado.`}</p>
          <p className="text-slate-500 mt-1">Usa el botón Registro en cada tendencia para ir directo a la hoja.</p>
        </div>
      </div>
    </div>
  </div>

  {/* ===== GRID 14 REGISTROS ===== */}
  <h2 className="text-base font-bold text-cyan-400 mb-4 uppercase tracking-wide">Los 14 Registros de Calidad</h2>
  {activeSheets.length===0&&(
  <div className="mb-4 text-xs text-yellow-400 bg-yellow-900/20 border border-yellow-700/30 rounded p-3">
    No se encontraron registros que coincidan con la pestaña {selectedTab}.
  </div>)}
  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 mb-8">
    {scopedSheets.map(s=>{
    const st=stSheet(s);
    const matchTab=s.matchTab;
    const isAlert=matchTab&&st==="alert",isWarn=matchTab&&st==="warn",isNd=!matchTab||st==="nd"||s.listadoMaestro;
    return(
    <div key={s.id} className={"card-base p-4 "+(isAlert?"card-alert pulse-red":isWarn?"card-warn":isNd?"card-nd opacity-80":"card-ok")}>
      <div className="flex items-center justify-between mb-2">
        <span className={"mono text-xs px-2 py-0.5 rounded font-bold "+(isAlert?"bg-red-900/50 text-red-300":isWarn?"bg-yellow-900/50 text-yellow-300":isNd?"bg-slate-700/50 text-slate-400":"bg-green-900/50 text-green-300")}>{s.codigo}</span>
        <span className={"text-xs font-bold "+(isAlert?"text-red-400 blink":isWarn?"text-yellow-400":isNd?"text-slate-500":"text-green-400")}>
          {isAlert?"ALERTA":isWarn?"ADVERTENCIA":isNd?(!matchTab&&selectedTab!=="TODAS"?"NO APLICA":(s.listadoMaestro?"LISTADO":"SIN DATOS")):"OK"}
        </span>
      </div>
      <p className="text-white text-xs font-semibold leading-tight mb-1">{s.nombre}</p>
      {s.nombreHoja&&<p className="text-slate-600 text-xs mono mb-3">Hoja activa: {selectedTab==="TODAS"?s.nombreHoja:selectedTab}</p>}
      {s.promedioMuestras&&<p className="text-cyan-400 text-xs mono mb-2">Promedio calculado con {s.promedioMuestras} hoja(s)</p>}
      {matchTab&&selectedTab!=="TODAS"&&s.dataSource==="base_registro"&&<p className="text-yellow-300 text-xs mono mb-2">Fuente: base del registro (sin consolidado publico del lote)</p>}
      <p className="text-slate-600 text-xs mono mb-2">Ubicacion lote/ref: {CELL_REFERENCE_MAP[s.id]||"N/D"}</p>
      {selectedTab!=="TODAS"&&<p className={"text-xs mb-2 "+(matchTab?"text-cyan-400":"text-slate-500")}>{matchTab?"Coincide con pestaña: "+selectedTab:"No coincide con pestaña: "+selectedTab}</p>}

      {!s.noData&&!s.listadoMaestro&&matchTab&&s.controles.map((c,i)=>{
      const isO=fuera(c),isN=cerca(c),num=typeof c.valor==="number";
      const avgEntry=(s.id===1||s.id===2)?((qualityTrendAvg[s.id]||[]).find((m)=>m.name===c.name)):null;
      const displayVal=avgEntry!=null?avgEntry.avg:c.valor;
      return(
      <div key={i} className={"mb-2 p-2 rounded text-xs "+(isO?"bg-red-900/30 border border-red-700/40":isN?"bg-yellow-900/20 border border-yellow-700/30":"bg-black/20")}>
        <div className="flex justify-between mb-1">
          <span className="text-slate-300 font-medium truncate mr-2">{c.name}</span>
          <span className={"mono font-bold shrink-0 "+(isO?"text-red-400":isN?"text-yellow-400":"text-green-400")}>{typeof displayVal==="number"?displayVal+c.unidad:c.valor}</span>
        </div>
        <div className="flex justify-between text-slate-500 mb-1">
          <span>Lim: {c.op==="min"?">=":c.op==="max"?"<":""}{c.limite}{typeof c.limite==="number"?c.unidad:""}</span>
          {isO&&<span className="text-red-400 font-bold">FUERA</span>}
          {isN&&!isO&&<span className="text-yellow-400">CERCA</span>}
        </div>
        {num&&<div className="w-full bg-slate-800 rounded-full h-1.5"><div className={"h-1.5 rounded-full pbar "+pctCol(c)} style={{width:Math.min(pct(c),100)+"%"}}/></div>}
      </div>);})}

      {s.listadoMaestro&&<p className="text-slate-500 text-xs italic py-1">Listado maestro - ver hoja para detalle RC.PD.xx</p>}
      {s.noData&&<p className="text-slate-500 text-xs italic py-2">Archivo no accesible (requiere login Google Sheets)</p>}
      <div className="flex items-center justify-between mt-3 pt-2 border-t border-slate-800/50 gap-2 flex-wrap">
        <span className="text-slate-600 text-xs mono">{s.ultimaFecha}</span>
        <a href={s.hojaDirecta||s.link} target="_blank" rel="noopener noreferrer" className={"btn-hoja "+(isAlert?"btn-alerta":"")}>
          &#8599; Ver {selectedTab==="TODAS"?(s.nombreHoja||"hoja"):selectedTab}
        </a>
      </div>
    </div>);})}
  </div>

  <div className="text-center py-3 border-t border-slate-800/40">
    <p className="text-slate-700 text-xs">Dashboard FSSC 22000 - INGAMA Beneficiadora - 14 Registros Reales Verificados - 31/03/2026</p>
  </div>

  <div className="mt-8">
    <h2 className="text-base font-bold text-cyan-400 mb-4 uppercase tracking-wide">Cobertura de Lotes y Registros</h2>
    <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
      <div className="card-base card-dark p-4">
        <h3 className="text-sm font-bold text-green-300 mb-3">Lotes completos</h3>
        {completeLots.length===0?<p className="text-xs text-slate-500">Todavía no hay lotes con los 14 registros completos.</p>:<div className="space-y-2">{completeLots.map(item=>(<div key={item.tab} className="rounded border border-green-700/30 bg-green-950/20 p-3 text-xs"><span className="mono text-green-300 font-bold">{item.tab}</span><span className="text-slate-400 ml-2">{item.present.length} de {SHEETS.length} registros</span></div>))}</div>}
      </div>
      <div className="card-base card-dark p-4">
        <h3 className="text-sm font-bold text-yellow-300 mb-3">Lotes con registros faltantes</h3>
        <div className="space-y-2 max-h-96 overflow-auto pr-1">
          {incompleteLots.map(item=>(
          <div key={item.tab} className="rounded border border-yellow-700/30 bg-yellow-950/10 p-3 text-xs">
            <div className="flex items-center justify-between gap-2 mb-1">
              <span className="mono text-yellow-300 font-bold">{item.tab}</span>
              <span className="text-slate-500">{item.present.length}/{SHEETS.length}</span>
            </div>
            <p className="text-slate-400">Faltan: {item.missing.join(", ")}</p>
          </div>))}
        </div>
      </div>
      <div className="card-base card-dark p-4">
        <h3 className="text-sm font-bold text-cyan-300 mb-3">Ultimas Fechas por Registro</h3>
        <div className="space-y-2 max-h-96 overflow-auto pr-1">
          {latestRecords.map(item=>(
          <div key={item.codigo} className="rounded border border-cyan-800/30 bg-cyan-950/10 p-3 text-xs">
            <div className="flex items-center justify-between gap-2 mb-1">
              <span className="mono text-cyan-300 font-bold">{item.codigo}</span>
              <span className="text-slate-300">{item.ultimaFecha||"SIN FECHA"}</span>
            </div>
            <p className="text-slate-400 leading-relaxed">{item.nombre}</p>
            <p className="text-slate-500 mt-1">Hoja/Lote referencia: {item.hoja||"N/D"}</p>
            <p className="text-slate-600 mt-1">Fuente: {item.dataSource==="estatico"?"Todas las hojas del link":item.dataSource==="lote_real"?"Lote real":item.dataSource==="consolidado"?"Consolidado":"Base del registro"}</p>
          </div>))}
        </div>
      </div>
    </div>
  </div>
</div>
)}
</div>);}

try{
  ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
}catch(error){
  const root=document.getElementById("root");
  if(root){
    root.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#080e1a;color:#fca5a5;font-family:Segoe UI,sans-serif;">
      <div style="max-width:780px;border:1px solid rgba(239,68,68,.45);background:rgba(127,29,29,.2);padding:20px;border-radius:12px;">
        <h2 style="margin:0 0 10px;font-size:18px;color:#f87171;">Error de carga del dashboard</h2>
        <p style="margin:0 0 8px;color:#fecaca;">Se produjo un error de JavaScript y la vista no pudo renderizarse.</p>
        <p style="margin:0;color:#fca5a5;font-size:12px;word-break:break-word;">${String(error&&error.message?error.message:error)}</p>
      </div>
    </div>`;
  }
  console.error("Dashboard render failed",error);
}
</script>
</body>
</html>
